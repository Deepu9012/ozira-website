<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozira - The Art of Perfection</title><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:black;
  color:white;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:gold;
}

.menu a{
  margin:0 15px;
  text-decoration:none;
  color:white;
}

/* HERO (BANNER IMAGE) */
.hero{
  height:100vh;
  width:100%;
  background:url('hero.jpg') no-repeat center center/cover;
}

/* PRODUCTS */
.products{
  padding:50px;
  text-align:center;
}

.products h1{
  margin-bottom:30px;
  color:gold;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  margin:15px;
  display:inline-block;
  width:250px;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

.btn{
  background:gold;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:#111;
  margin-top:50px;
}
</style><script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added to cart");
}
</script></head><body><!-- NAVBAR --><div class="nav">
  <div class="logo">OZIRA</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="cart.html">🛒</a>
  </div>
</div><!-- HERO --><section class="hero"></section><!-- PRODUCTS --><div class="products"><h1>Our Collection</h1><div class="card">
  <img src="pink.jpeg">
  <h3>Midnight Oud</h3>
  <p>₹299</p>
  <button class="btn" onclick="addToCart('Midnight Oud',299)">Add to Cart</button>
</div><div class="card">
  <img src="blue.png">
  <h3>Aqua Rush</h3>
  <p>₹299</p>
  <button class="btn" onclick="addToCart('Aqua Rush',299)">Add to Cart</button>
</div><div class="card">
  <img src="clear.png">
  <h3>Alpine Luxury</h3>
  <p>₹299</p>
  <button class="btn" onclick="addToCart('Alpine Luxury',299)">Add to Cart</button>
</div></div><!-- FOOTER --><div class="footer">
  <p>© 2026 OZIRA - The Art of Perfection</p>
</div></body>
</html>
