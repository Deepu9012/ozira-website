<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZIRA - Luxury Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#0b0b0b;color:#fff;}

.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#000;
  align-items:center;
}

.logo{
  font-size:30px;
  color:gold;
  font-weight:bold;
  letter-spacing:2px;
}

.menu a{
  margin:0 15px;
  color:white;
  text-decoration:none;
}

.hero{
  height:90vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
  url('assets/images/banner-1.jpg') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:50px;
  color:gold;
}

.hero p{
  margin:15px 0;
}

.btn{
  background:gold;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

.products{
  padding:50px;
  text-align:center;
}

.products h2{
  color:gold;
  margin-bottom:30px;
}

.card{
  display:inline-block;
  width:250px;
  margin:15px;
  background:#111;
  padding:20px;
  border-radius:15px;
}

.card img{
  width:100%;
}

.footer{
  text-align:center;
  padding:20px;
  background:#000;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">OZIRA</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Fragrance</a>
    <a href="#">Pocket Perfume</a>
    <a href="#">Contact</a>
  </div>
</div>

<section class="hero">
  <div>
    <h1>BUY 2 GET 1 FREE</h1>
    <p>Luxury fragrances crafted for perfection</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="products">
  <h2>Our Collection</h2>

  <div class="card">
    <img src="assets/images/pink.jpeg">
    <h3>Midnight Oud</h3>
    <p>₹299</p>
  </div>

  <div class="card">
    <img src="assets/images/blue.png">
    <h3>Aqua Rush</h3>
    <p>₹299</p>
  </div>

  <div class="card">
    <img src="assets/images/clear.png">
    <h3>Alpine Luxury</h3>
    <p>₹299</p>
  </div>

</section>

<div class="footer">
  <p>© 2026 OZIRA Perfumes</p>
</div>

</body>
</html>
