<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozira - The Art of Perfection</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}

/* HEADER */
header {
  position: absolute;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px;
  z-index: 10;
}

.logo {
  font-family: 'Playfair Display', serif;
  color: gold;
  font-size: 28px;
}

/* HERO VIDEO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.bg-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
}

.overlay {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
}

.overlay h1 {
  font-size: 60px;
  color: gold;
  letter-spacing: 2px;
  animation: fadeIn 2s ease;
}

.overlay p {
  opacity: 0.8;
  animation: fadeIn 3s ease;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 30px;
  padding: 50px;
  background: #000;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  backdrop-filter: blur(15px);
  text-align: center;
  transition: 0.5s;
  border: 1px solid rgba(255,215,0,0.2);
}

.card:hover {
  transform: scale(1.07);
  box-shadow: 0 0 40px gold;
}

.product-img {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background: white;
  border-radius: 15px;
}

/* BUTTON */
.btn {
  background: linear-gradient(45deg, gold, #d4af37);
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 10px;
}

/* SECTION */
.section {
  text-align: center;
  padding: 80px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  padding: 15px;
  border-radius: 50%;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}
</style>

<script>
function buyNow(product){
  let number = "91XXXXXXXXXX";
  let msg = "I want to buy " + product;
  window.open("https://wa.me/"+number+"?text="+msg);
}
</script>

</head>

<body>

<header>
  <div class="logo">OZIRA</div>
  <div>Luxury Perfumes</div>
</header>

<!-- HERO VIDEO -->
<section class="hero">
  <video autoplay muted loop class="bg-video">
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h1>The Art of Perfection</h1>
    <p>Crafted for elegance and timeless luxury</p>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
  <img src="pink.png.jpeg" class="product-img">
  <h3>Midnight Oud</h3>
  <button class="btn" onclick="buyNow('Midnight Oud')">Buy Now</button>
</div>

<div class="card">
  <img src="blue.png.png" class="product-img">
  <h3>Aqua Rush</h3>
  <button class="btn" onclick="buyNow('Aqua Rush')">Buy Now</button>
</div>

<div class="card">
  <img src="clear.png.png" class="product-img">
  <h3>Alpine Luxury</h3>
  <button class="btn" onclick="buyNow('Alpine Luxury')">Buy Now</button>
</div>

</section>

<section class="section">
  <h2>🔥 Buy 2 Get 1 Free</h2>
</section>

<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp">💬</a>

</body>
</html>
