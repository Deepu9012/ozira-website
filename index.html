<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZIRA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  background:#0b0b0b;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:#111;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:gold;
  font-size:26px;
  font-weight:bold;
}

.logo img{
  width:35px;
}

/* MENU */
.menu{
  display:flex;
  gap:25px;
  align-items:center;
}

.menu-item{
  position:relative;
  cursor:pointer;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:30px;
  left:0;
  background:white;
  color:black;
  width:200px;
  display:none;
}

.dropdown div{
  padding:12px;
}

.dropdown div:hover{
  background:#eee;
}

.menu-item:hover .dropdown{
  display:block;
}

/* SEARCH */
.search{
  cursor:pointer;
}

/* SEARCH POPUP */
.search-box{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.search-box input{
  width:60%;
  padding:15px;
  font-size:18px;
  border-radius:30px;
  border:none;
}

/* HERO */
.hero{
  height:90vh;
  background:url('hero.jpeg') no-repeat center/cover;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png">
    OZIRA
  </div>

  <!-- MENU -->
  <div class="menu">

    <div class="menu-item">Home</div>

    <!-- FRAGRANCE -->
    <div class="menu-item">Fragrances ▼
      <div class="dropdown">
        <div>Perfumes</div>
        <div>Pocket Perfumes</div>
      </div>
    </div>

    <!-- GIFT -->
    <div class="menu-item">Gifting ▼
      <div class="dropdown">
        <div>Gift Packs</div>
        <div>Gift Sets</div>
        <div>Combos</div>
      </div>
    </div>

    <div class="menu-item">About</div>
    <div class="menu-item">Contact</div>

    <div class="search" onclick="openSearch()">🔍</div>

  </div>
</div>

<!-- SEARCH BOX -->
<div class="search-box" id="searchBox">
  <input type="text" placeholder="Search products...">
</div>

<!-- HERO -->
<div class="hero"></div>

<script>
function openSearch(){
  document.getElementById("searchBox").style.display="flex";
}

document.getElementById("searchBox").onclick=function(){
  this.style.display="none";
}
</script>

</body>
</html>
